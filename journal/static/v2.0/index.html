<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Journal v2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="topbar">
        <div class="brand">
            <span class="brand-dot"></span>
            <div>
                <h1>Local Journal</h1>
                <p>v2.0 reflective workspace</p>
            </div>
        </div>
        <div id="health-status" class="health"></div>
    </header>

    <main class="layout">
        <aside class="panel nav-panel">
            <p class="panel-label">Modes</p>
            <nav class="tabs">
                <button class="tab active" data-tab="dump">Brain Dump</button>
                <button class="tab" data-tab="search">Semantic Search</button>
                <button class="tab" data-tab="browse">Entry Archive</button>
            </nav>
            <div class="panel-tip">
                <p>Tip: dump fast, reflect slowly.</p>
            </div>
        </aside>

        <section class="content">
            <section id="tab-dump" class="tab-content">
                <div id="dump-input" class="panel stage-card">
                    <div class="stage-head">
                        <h2>Capture the raw draft</h2>
                        <span class="chip">Stage 1</span>
                    </div>
                    <p class="hint">Write freely. You can clean it up later.</p>
                    <textarea id="raw-dump" placeholder="What's moving through your mind right now?" rows="10"></textarea>
                    <div class="actions-row">
                        <button id="btn-start" class="btn btn-primary">Start Reflection</button>
                    </div>
                </div>

                <div id="dump-chat" class="panel stage-card hidden">
                    <div class="stage-head">
                        <h2>Reflective conversation</h2>
                        <span class="chip">Stage 2</span>
                    </div>
                    <div id="chat-messages"></div>
                    <div class="chat-input-row">
                        <input type="text" id="chat-reply" placeholder="Reply and press Enter...">
                        <button id="btn-reply" class="btn btn-primary">Send</button>
                        <button id="btn-done" class="btn btn-secondary">I'm Done</button>
                    </div>
                </div>

                <div id="dump-review" class="panel stage-card hidden">
                    <div class="stage-head">
                        <h2>Polished entry</h2>
                        <span class="chip">Stage 3</span>
                    </div>
                    <div id="polished-preview" class="entry-preview"></div>
                    <textarea id="polished-edit" rows="12" class="hidden"></textarea>
                    <div class="actions-row">
                        <button id="btn-edit-toggle" class="btn btn-secondary">Edit</button>
                        <button id="btn-save" class="btn btn-primary">Save Entry</button>
                        <button id="btn-new" class="btn btn-ghost">Start Over</button>
                    </div>
                </div>
            </section>

            <section id="tab-search" class="tab-content hidden">
                <div class="panel stage-card">
                    <div class="stage-head">
                        <h2>Ask your journal</h2>
                    </div>
                    <div class="search-bar">
                        <input type="text" id="search-query" placeholder="What have I learned recently about patience?">
                        <button id="btn-search" class="btn btn-primary">Search</button>
                    </div>
                    <div id="search-results" class="hidden">
                        <div id="search-refs"></div>
                        <div id="search-answer"></div>
                    </div>
                </div>
            </section>

            <section id="tab-browse" class="tab-content hidden">
                <div class="panel stage-card">
                    <div class="stage-head">
                        <h2>Browse entries</h2>
                    </div>
                    <div id="entries-list"></div>
                    <div id="entry-detail" class="hidden"></div>
                </div>
            </section>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
